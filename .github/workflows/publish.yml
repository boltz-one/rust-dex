name: Publish crates

# Publishes the `boltz-*` (GPUI tree) crates to crates.io.
#
#   * Push a tag matching `v*` (e.g. `v0.2.2`) to trigger a real publish.
#   * Or run manually via "Run workflow" — defaults to a safe dry-run.
#
# Requires the repository secret CARGO_REGISTRY_TOKEN (crates.io API token).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only (package + checks), do not upload to crates.io"
        type: boolean
        default: true

concurrency:
  group: publish-crates
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: cargo-publish-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: cargo-publish-

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          # Real publish on tag push; dry-run when dispatched with the default.
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          NO_VERIFY: "1"
        run: |
          chmod +x scripts/publish-crates.sh
          ./scripts/publish-crates.sh
